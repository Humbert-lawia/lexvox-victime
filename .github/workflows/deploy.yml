name: Deploy to Cloudflare Pages

# DÉPLOIEMENT AUTOMATIQUE DÉSACTIVÉ le 2026-07-06 (incident template :
# un push sur main a écrasé le site Sanity servi par le projet Cloudflare
# Pages "lexvox-victime"). Ne réactiver le déclencheur "push" que sur
# demande expresse de Me Humbert. Déploiement possible uniquement à la
# main via l'onglet Actions (workflow_dispatch).
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=lexvox-victime --branch=main

      - name: Ping IndexNow (Bing, Yandex, Seznam)
        continue-on-error: true
        run: python3 tools/indexnow_ping.py
