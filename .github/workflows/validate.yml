name: Validation site

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  preflight:
    runs-on: ubuntu-latest
    name: Préflight (sitemap, JSON-LD, conflits, images)
    steps:
      - uses: actions/checkout@v4

      - name: Lancer le préflight
        run: python3 tools/preflight.py

      - name: QA standard LEXVOX-AIVF (articles publiés de la file)
        run: python3 tools/qa_queue.py
